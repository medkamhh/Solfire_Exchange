<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Solfire Pro - Login</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{height:100vh;font-family:'Inter',sans-serif;background:#0b0e11;display:flex;align-items:center;justify-content:center;color:#eaecef}
.box{width:92%;max-width:420px;padding:36px 32px;border-radius:16px;background:#181a20;box-shadow:0 8px 40px rgba(0,0,0,.6);border:1px solid #2b3139}
.logo{font-weight:800;color:#fcd535;font-size:36px;text-align:center;margin-bottom:6px;display:flex;align-items:center;justify-content:center;gap:10px}
.sub{color:#848e9c;text-align:center;margin-bottom:32px;font-size:14px}
label{display:block;margin-top:18px;color:#848e9c;font-size:13px;font-weight:600;margin-bottom:6px}
input{width:100%;padding:13px 14px;border-radius:8px;border:1px solid #2b3139;background:#0b0e11;color:#eaecef;font-family:'Inter';font-size:15px}
input:focus{outline:none;border-color:#fcd535}
.btn{width:100%;padding:14px;border-radius:8px;background:#fcd535;border:none;color:#181a20;font-weight:800;font-size:16px;margin-top:28px;cursor:pointer;transition:.2s;font-family:'Inter'}
.btn:hover{background:#e0be2f}.btn:active{transform:scale(.98)}
.err{margin-top:12px;color:#f6465c;background:rgba(246,70,92,.08);padding:10px 14px;border-radius:8px;font-size:14px;border:1px solid rgba(246,70,92,.2)}
.hint{color:#848e9c;font-size:12px;margin-top:18px;text-align:center}
</style></head><body>
<div class="box">
  <div class="logo"><i class="fa-solid fa-fire" style="color:#fcd535"></i> SOLFIRE</div>
  <div class="sub">Professional Crypto Exchange</div>
  {% if err %}<div class="err">{{ err }}</div>{% endif %}
  <form method="post" action="/login">
    <label for="email">Email Address</label>
    <input id="email" name="email" type="email" placeholder="user@gmail.com" autocomplete="off" required>
    <label for="password">Password</label>
    <input id="password" name="password" type="password" placeholder="••••••••" autocomplete="off" required>
    <button class="btn" type="submit">Log In</button>
  </form>
  <div class="hint">Any @gmail.com + any password accepted in dev mode</div>
</div>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</body></html>
